name: CI

# Build and test the enterprise RAG platform on every commit to main
# and on every pull request targeting main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs for the same ref to save runner time.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

jobs:
  build-test:
    name: Build & Test
    # ubuntu-latest ships Docker, which the Testcontainers-based
    # integration tests require.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore enterprise-rag-platform.sln

      - name: Build
        run: dotnet build enterprise-rag-platform.sln --configuration Release --no-restore -warnaserror

      - name: Test
        run: >-
          dotnet test enterprise-rag-platform.sln
          --configuration Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./test-results

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results/**/*.trx
          if-no-files-found: ignore
